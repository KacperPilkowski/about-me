<aside class="fixed inset-y-0 left-0 w-sidebar bg-base border-r border-border
              z-raised flex flex-col items-center py-10 px-8
              lg:w-sidebar md:w-[280px] max-md:hidden">

  <!-- Language Switcher -->
  <div class="w-full flex justify-end mb-10">
    <app-language-switcher />
  </div>

  <!-- Avatar placeholder -->
  <div class="w-24 h-24 rounded-full bg-surface border border-border mb-6 shrink-0"
       aria-label="Avatar placeholder"></div>

  <!-- Name placeholder -->
  <p class="font-mono text-lg text-primary tracking-wide text-center mb-2">
    Your Name
  </p>

  <!-- Role placeholder -->
  <p class="font-body text-sm text-muted text-center mb-8">
    Your Role / Title
  </p>

  <!-- Divider -->
  <div class="w-full border-t border-border mb-8"></div>

  <!-- Social links placeholder -->
  <div class="flex items-center gap-4" aria-label="Social links placeholder">
    <div class="w-8 h-8 rounded-md bg-surface border border-border"></div>
    <div class="w-8 h-8 rounded-md bg-surface border border-border"></div>
    <div class="w-8 h-8 rounded-md bg-surface border border-border"></div>
  </div>

</aside>
