<app-network-background />
<app-sidebar />

<!-- Mobile intro panel — visible only < md -->
<section class="md:hidden min-h-screen flex flex-col items-center justify-center bg-base px-8 relative">

  <!-- Language switcher -->
  <div class="absolute top-4 left-4">
    <app-language-switcher />
  </div>

  <!-- Avatar -->
  <img
    src="/assets/profile-photo-320x320.webp"
    alt="Kacper Piłkowski"
    class="w-52 h-52 rounded-full ring-2 ring-border shrink-0"
    width="208"
    height="208"
  />

  <!-- Name -->
  <h1 class="mt-6 mb-2 text-2xl font-bold font-mono text-primary tracking-wide text-center">
    Kacper Piłkowski
  </h1>

  <!-- Role -->
  <p class="text-lg text-accent tracking-wide text-center mb-8">
    {{ 'sidebar.role' | translate }}
  </p>

  <!-- Get In Touch label -->
  <p class="text-xs text-muted uppercase tracking-widest mt-6 mb-3">
    {{ 'sidebar.get_in_touch' | translate }}
  </p>

  <!-- Social icons -->
  <div class="flex items-center gap-4 mb-3">
    <!-- LinkedIn -->
    <a href="https://www.linkedin.com/in/pilkowski"
       target="_blank"
       rel="noopener noreferrer"
       aria-label="LinkedIn profile"
       class="text-muted hover:text-accent transition-colors duration-fast
              focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-accent
              focus-visible:ring-offset-2 focus-visible:ring-offset-base rounded-sm">
      <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
      </svg>
    </a>

    <!-- GitHub -->
    <a href="https://github.com/KacperPilkowski"
       target="_blank"
       rel="noopener noreferrer"
       aria-label="GitHub profile"
       class="text-muted hover:text-accent transition-colors duration-fast
              focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-accent
              focus-visible:ring-offset-2 focus-visible:ring-offset-base rounded-sm">
      <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
      </svg>
    </a>
  </div>

  <!-- "Or" divider -->
  <p class="text-xs text-muted mb-3">
    {{ 'sidebar.or' | translate }}
  </p>

  <!-- CTA -->
  <app-cta-button />

  <!-- Scroll indicator -->
  <div class="absolute bottom-8 flex flex-col items-center animate-bounce">
    <span class="text-xs text-muted font-mono mb-2">{{ 'scroll.down' | translate }}</span>
    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-muted" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
    </svg>
  </div>

</section>

<main class="ml-[360px] lg:ml-[360px] md:ml-[280px] max-md:ml-0
             min-h-screen px-16 pt-12 max-md:px-6 max-md:pt-8">
  <div class="max-w-[960px]">
    <router-outlet />
  </div>
</main>
